/**
 * Configuración de Nginx para el frontend en producción (Docker).
 *
 * - Escucha en puerto 80 y sirve los archivos estáticos generados por Vite.
 * - try_files: soporte para SPA (Single Page Application) con React Router.
 * - Proxy reverso: redirige peticiones /v1/* al orchestrator-service dentro de la red Docker.
 *   Usa variable $upstream con resolución DNS de Docker (127.0.0.11) para que
 *   nginx resuelva el hostname "orchestrator-service" dinámicamente.
 * - Páginas de error personalizadas para errores 5xx.
 */
server {
  listen 80;
  server_name localhost;

  /** Resolver DNS de Docker para nombres de servicio dentro de la red. */
  resolver 127.0.0.11 valid=30s ipv6=off;

  /** Servir archivos estáticos del build de Vite. Soporte SPA. */
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  /** Proxy reverso hacia el orchestrator-service para peticiones del API REST. */
  location /v1/ {
    set $upstream http://orchestrator-service:8080;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  /** Página de error personalizada para errores de servidor (5xx). */
  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}
