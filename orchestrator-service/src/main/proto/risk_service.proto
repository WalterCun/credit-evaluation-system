syntax = "proto3";

package risk;

option java_package = "com.credit.risk.grpc";
option java_multiple_files = true;

message RiskRequest {
  string cedula = 1;
}

message RiskScoreResponse {
  string cedula = 1;
  int32 score = 2;
}

message DebtInfo {
  string cedula = 1;
  string entidad = 2;
  double monto = 3;
  double mensualidad = 4;
}

message DebtsResponse {
  repeated DebtInfo debts = 1;
}

service RiskGrpc {
  rpc GetScore (RiskRequest) returns (RiskScoreResponse);
  rpc GetDebts (RiskRequest) returns (DebtsResponse);
}
