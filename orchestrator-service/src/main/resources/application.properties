quarkus.http.port=8080

quarkus.datasource.db-kind=postgresql
quarkus.datasource.reactive.url=postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:creditdb}
quarkus.datasource.username=${DB_USER:credituser}
quarkus.datasource.password=${DB_PASS:creditpass}
quarkus.hibernate-orm.database.generation=none

quarkus.grpc.clients.risk-service.host=${GRPC_RISK_HOST:risk-service}
quarkus.grpc.clients.risk-service.port=${GRPC_RISK_PORT:9000}

quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern=%h %r %s %b %D

quarkus.log.level=INFO
quarkus.log.category."com.credit.orchestrator".level=DEBUG

%prod.quarkus.http.cors=false

%dev.quarkus.http.port=8080
%dev.quarkus.http.cors=true
%dev.quarkus.http.cors.origins=http://localhost:5173
%dev.quarkus.http.cors.methods=GET,POST,OPTIONS
%dev.quarkus.http.cors.headers=Content-Type,Authorization
%dev.quarkus.http.cors.access-control-max-age=24H
%dev.quarkus.datasource.reactive.url=postgresql://localhost:5432/creditdb
%dev.quarkus.datasource.username=credituser
%dev.quarkus.datasource.password=creditpass
%dev.quarkus.grpc.clients.risk-service.host=localhost
%dev.quarkus.grpc.clients.risk-service.port=9000
